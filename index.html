<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratorios</title>
    <style>
      body {
        background-color: #000;
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 50px;
      }
      h1 {
        font-size: 3em;
        color: #4169E1;
        text-shadow: 0 0 5px #4169E1, 0 0 10px #4169E1;
      }
      p {
        font-size: 1.2em;
        color: #6495ED;
        text-shadow: 0 0 5px #6495ED, 0 0 10px #6495ED;
      }
      .button {
        display: inline-block;
        padding: 15px 30px;
        margin: 10px;
        background-color: transparent;
        color: #1E90FF;
        text-decoration: none;
        border: 2px solid #1E90FF;
        border-radius: 10px;
        font-size: 1.2em;
        font-weight: bold;
        text-shadow: 0 0 5px #1E90FF;
        box-shadow: 0 0 10px #1E90FF, inset 0 0 10px rgba(30, 144, 255, 0.1);
        transition: all 0.3s ease;
      }
      .button:hover {
        background-color: #1E90FF;
        color: #000;
        box-shadow: 0 0 15px #1E90FF, 0 0 20px #1E90FF, inset 0 0 15px rgba(30, 144, 255, 0.3);
        transform: scale(1.02);
      }
    </style>
  </head>
  <body>
    <h1>Laboratorios</h1>
    <p>Bienvenido a la página principal de los laboratorios.</p>
    <a href="Lab02/" class="button">Laboratorio 02</a>
    <a href="Lab03/" class="button">Laboratorio 03</a>
    <a href="Lab04/" class="button">Laboratorio 04</a>
    <a href="Lab05/" class="button">Laboratorio 05</a>
    <a href="Lab06/" class="button">Laboratorio 06</a>
    <a href="Lab07/dist/" class="button">Laboratorio 07</a>
    <a href="Lab08/dist/" class="button">Laboratorio 08</a>
  </body>
</html>
